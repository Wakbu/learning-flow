name: Deploy Vite React App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 저장소 코드를 GitHub Actions 환경으로 가져옵니다.
      - name: Checkout
        uses: actions/checkout@v4

      # Node.js 실행 환경을 준비합니다.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # package-lock.json 기준으로 의존성을 설치합니다.
      - name: Install dependencies
        run: npm ci

      # Vite 프로젝트를 정적 파일로 빌드합니다.
      - name: Build
        run: npm run build

      # GitHub Pages 배포용 아티팩트를 준비합니다.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Vite 빌드 결과물인 dist 폴더를 업로드합니다.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      # 업로드한 dist 결과물을 GitHub Pages로 배포합니다.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4